name: Daily Business Scrape

on:
  schedule:
    - cron: '0 0 * * *' # Runs every night at midnight
  workflow_dispatch: # Allows you to run it manually for testing

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly installing the stealth package to avoid ModuleNotFoundError
          pip install playwright playwright-stealth pandas requests
          # Install browser with system dependencies (crucial for Linux runners)
          playwright install chromium --with-deps

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add eu_businesses.csv
          # The '|| exit 0' ensures the workflow doesn't fail if there are no new changes
          git commit -m "Update digital business listings" || exit 0
          git pull --rebase origin main
          git push origin main
